version: "3.9"

services:
  mongodb:
    image: mongo:7
    container_name: forge_mongo
    ports:
      - "27017:27017"
    volumes:
      - forge_mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build: .
    container_name: forge_backend
    ports:
      - "8000:8000"
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      - MONGO_URI=mongodb://mongodb:27017/forge_db
      - JWT_SECRET=your_secret_key
      - ACCESS_TOKEN_EXPIRE=15
      - REFRESH_TOKEN_EXPIRE=7
    volumes:
      - .:/app
    restart: unless-stopped
    command: >
      sh -c "uvicorn main:app --host 0.0.0.0 --port 8000 --reload"

volumes:
  forge_mongo_data:
    driver: local