version: "3.9"

services:
  mongodb:
    image: mongo:7
    container_name: forge_mongo
    ports:
      - "27017:27017"
    volumes:
      - forge_mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  forge_mongo_data:
    driver: local
